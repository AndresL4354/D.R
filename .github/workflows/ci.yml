# CI de docnomina-web — corre en cada push/PR a main.
# Gate mínimo del plan ajustado: lint → typecheck → build.
# pgTAP (supabase/tests) se ejecuta aparte con `node scripts/run-pgtap.mjs`
# porque requiere el token de la BD; es bloqueante antes del cutover (Fase 8).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
